<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告信息 - 校园活动管理系统</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
    <link th:href="@{/css/fontawesome.min.css}" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">
                <i class="fas fa-graduation-cap"></i> 校园活动管理系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">
                            <i class="fas fa-home"></i> 首页
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/activity/list}">
                            <i class="fas fa-calendar-alt"></i> 活动列表
                        </a>
                    </li>
                    <li th:if="${session.user == null}" class="nav-item">
                        <a class="nav-link" th:href="@{/user/login}">
                            <i class="fas fa-sign-in-alt"></i> 登录
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/announcement}">
                            <i class="fas fa-bullhorn"></i> 公告信息
                        </a>
                    </li>
                    <li th:if="${session.user != null}" class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                            <img th:if="${session.user.avatar != null}" 
                                 th:src="@{|/${session.user.avatar}|}" 
                                 alt="用户头像" 
                                 style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover; margin-right: 8px;">
                            <i th:if="${session.user.avatar == null}" class="fas fa-user-circle" style="margin-right: 8px;"></i>
                            <span th:text="${session.user != null ? session.user.username : ''}"></span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <a class="dropdown-item" th:href="@{/user/profile}">
                                    <i class="fas fa-user"></i> 个人中心
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-item" th:href="@{/user/logout}">
                                    <i class="fas fa-sign-out-alt"></i> 退出登录
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 公告信息页面 -->
    <div class="container mt-5">
        <div class="page-header">
            <h1 class="page-title">
                <i class="fas fa-bullhorn"></i> 公告信息
            </h1>
            <p class="page-subtitle">查看最新校园活动公告和通知</p>
        </div>
        
        <div class="announcement-list">
            <div th:each="announcement : ${announcements}" class="announcement-item mb-4 p-4 border rounded shadow-sm">
                <div class="announcement-header d-flex justify-content-between align-items-center mb-3">
                    <h3 class="announcement-title h4 mb-0" th:text="${announcement.title}"></h3>
                    <span class="announcement-date text-muted" th:text="${#dates.format(announcement.createTime, 'yyyy年MM月dd日')}"></span>
                </div>
                <div class="announcement-content">
                    <p th:text="${announcement.content}"></p>
                </div>
                <div class="announcement-footer mt-3 text-right">
                    <span th:switch="${announcement.status}">
                        <span th:case="'published'" class="badge bg-success">已发布</span>
                        <span th:case="'1'" class="badge bg-success">已发布</span>
                        <span th:case="'draft'" class="badge bg-secondary">未发布</span>
                        <span th:case="'0'" class="badge bg-secondary">未发布</span>
                        <span th:case="*" class="badge bg-secondary">未发布</span>
                    </span>
                </div>
            </div>
            <div th:if="${announcements == null or announcements.isEmpty()}" class="text-center py-10">
                <i class="fas fa-bullhorn text-muted" style="font-size: 48px;"></i>
                <p class="text-muted mt-3">暂无公告信息</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-light py-4 mt-5">
        <div class="container text-center">
            <p class="text-muted mb-0">© 2026 校园活动管理系统 | 让校园生活更精彩</p>
        </div>
    </footer>

    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
