<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的报名 - 校园活动管理系统</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
    <link rel="stylesheet" th:href="@{/css/fontawesome.min.css}">
    <style>
        .registration-table {
            margin-top: 20px;
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
        }
        .status-pending {
            background-color: #ffc107;
            color: #000;
        }
        .status-approved {
            background-color: #28a745;
            color: #fff;
        }
        .status-rejected {
            background-color: #dc3545;
            color: #fff;
        }
    </style>
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="container mt-4 mb-5">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-clipboard-list"></i> 我的报名</h4>
            </div>
            <div class="card-body">
                <div th:if="${message}" class="alert alert-success alert-dismissible fade show">
                    <span th:text="${message}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div th:if="${#lists.isEmpty(registrations)}" class="text-center py-5">
                    <i class="fas fa-inbox fa-3x text-muted mb-3"></i>
                    <p class="text-muted">暂无报名记录</p>
                    <a th:href="@{/activity/list}" class="btn btn-primary">
                        <i class="fas fa-search"></i> 去报名活动
                    </a>
                </div>

                <table th:if="${!#lists.isEmpty(registrations)}" class="table table-hover registration-table">
                    <thead>
                        <tr>
                            <th>活动名称</th>
                            <th>活动时间</th>
                            <th>活动地点</th>
                            <th>报名时间</th>
                            <th>状态</th>
                            <th>备注</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="reg : ${registrations}">
                            <td th:text="${reg.activity.title}"></td>
                            <td th:text="${#dates.format(reg.activity.startTime, 'yyyy-MM-dd HH:mm')}"></td>
                            <td th:text="${reg.activity.location}"></td>
                            <td th:text="${#dates.format(reg.registrationTime, 'yyyy-MM-dd HH:mm')}"></td>
                            <td>
                                <span th:if="${reg.status == 'pending'}" class="status-badge status-pending">
                                    <i class="fas fa-clock"></i> 待审核
                                </span>
                                <span th:if="${reg.status == 'approved'}" class="status-badge status-approved">
                                    <i class="fas fa-check-circle"></i> 已通过
                                </span>
                                <span th:if="${reg.status == 'rejected'}" class="status-badge status-rejected">
                                    <i class="fas fa-times-circle"></i> 已拒绝
                                </span>
                            </td>
                            <td th:text="${reg.remark ?: '-'}"></td>
                            <td>
                                <a th:if="${reg.status == 'pending'}" 
                                   th:href="@{/registration/cancel/{id}(id=${reg.registrationId})}"
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('确定要取消报名吗？')">
                                    <i class="fas fa-times"></i> 取消报名
                                </a>
                                <span th:if="${reg.status != 'pending'}" class="text-muted">-</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer class="bg-light py-4 mt-5">
        <div class="container text-center">
            <p class="text-muted mb-0">© 2026 校园活动管理系统 | 让校园生活更精彩</p>
        </div>
    </footer>

    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
