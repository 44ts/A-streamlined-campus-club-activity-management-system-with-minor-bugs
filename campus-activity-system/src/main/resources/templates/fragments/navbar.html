<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- 导航栏片段 -->
    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid px-4">
            <a class="navbar-brand" th:href="@{/}">
                <i class="fas fa-graduation-cap"></i> 校园活动管理系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">
                            <i class="fas fa-home"></i> 首页
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/activity/list}">
                            <i class="fas fa-calendar-alt"></i> 活动列表
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/announcement}">
                            <i class="fas fa-bullhorn"></i> 公告信息
                        </a>
                    </li>
                    <li th:if="${session.user == null}" class="nav-item">
                        <a class="nav-link" th:href="@{/user/login}">
                            <i class="fas fa-sign-in-alt"></i> 登录
                        </a>
                    </li>
                    <li th:if="${session.user != null}" class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                            <img th:if="${session.user.avatar != null}" 
                                 th:src="@{|/${session.user.avatar}|}" 
                                 alt="用户头像" 
                                 style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover; margin-right: 8px; border: 2px solid #e0e0e0;">
                            <i th:if="${session.user.avatar == null}" class="fas fa-user-circle" style="margin-right: 8px; font-size: 24px;"></i>
                            <span th:text="${session.user.username}"></span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <a class="dropdown-item" th:href="@{/user/profile}">
                                    <i class="fas fa-user"></i> 个人中心
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-item" th:href="@{/user/logout}">
                                    <i class="fas fa-sign-out-alt"></i> 退出登录
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</body>
</html>
