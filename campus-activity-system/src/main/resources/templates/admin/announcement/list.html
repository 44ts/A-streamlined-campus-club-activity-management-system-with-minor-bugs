<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告管理 - 校园活动管理系统</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="container mt-5">
        <h2 class="text-center mb-4">公告管理</h2>
        
        <div class="mb-3">
            <a th:href="@{/announcement/add}" class="btn btn-primary">发布新公告</a>
        </div>

        <div th:if="${message}" class="alert alert-success" role="alert">
            <span th:text="${message}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger" role="alert">
            <span th:text="${error}"></span>
        </div>

        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>公告ID</th>
                    <th>标题</th>
                    <th>创建时间</th>
                    <th>更新时间</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="announcement : ${announcements}">
                    <td th:text="${announcement.announcementId}"></td>
                    <td th:text="${announcement.title}"></td>
                    <td th:text="${#dates.format(announcement.createTime, 'yyyy年MM月dd日')}"></td>
                    <td th:text="${#dates.format(announcement.updateTime, 'yyyy年MM月dd日')}"></td>
                    <td>
                        <span th:switch="${announcement.status}">
                            <span th:case="'published'" class="badge bg-success">已发布</span>
                            <span th:case="'draft'" class="badge bg-secondary">未发布</span>
                            <span th:case="*" class="badge bg-secondary">未发布</span>
                        </span>
                    </td>
                    <td>
                        <a th:href="@{/announcement/edit/{id}(id=${announcement.announcementId})}" class="btn btn-sm btn-primary">编辑</a>
                        <a th:href="@{/announcement/delete/{id}(id=${announcement.announcementId})}" class="btn btn-sm btn-danger" onclick="return confirm('确定要删除这条公告吗？');">删除</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
