<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报名审核 - 校园活动管理系统</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">报名审核</h4>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover">
                        <thead class="thead-light">
                            <tr>
                                <th>ID</th>
                                <th>活动标题</th>
                                <th>活动地点</th>
                                <th>开始时间</th>
                                <th>结束时间</th>
                                <th>活动类型</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="activity : ${activities}">
                                <td th:text="${activity.activityId}"></td>
                                <td th:text="${activity.title}"></td>
                                <td th:text="${activity.location}"></td>
                                <td th:text="${#dates.format(activity.startTime, 'yyyy-MM-dd HH:mm')}"></td>
                                <td th:text="${#dates.format(activity.endTime, 'yyyy-MM-dd HH:mm')}"></td>
                                <td th:text="${activity.type}"></td>
                                <td>
                                    <a th:href="@{/activity/approve/{id}(id=${activity.activityId})}" class="btn btn-sm btn-success mr-2">
                                        <i class="fas fa-check"></i> 通过
                                    </a>
                                    <a th:href="@{/activity/reject/{id}(id=${activity.activityId})}" class="btn btn-sm btn-danger">
                                        <i class="fas fa-times"></i> 拒绝
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
