<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 校园活动管理系统</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
    <link th:href="@{/css/fontawesome.min.css}" rel="stylesheet">
    <style>
        .avatar-thumb {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #e0e0e0;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid px-4">
            <a class="navbar-brand" th:href="@{/}">
                <i class="fas fa-graduation-cap"></i> 校园活动管理系统
            </a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <span class="text-muted">
                    <i class="fas fa-user-circle"></i> 
                    <span th:text="${session.user.username}"></span>
                </span>
                <a th:href="@{/}" class="btn btn-sm btn-outline-secondary">
                    <i class="fas fa-home"></i> 返回首页
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-12">
                <div class="card shadow-sm">
                    <div class="card-header bg-white py-3">
                        <h3 class="mb-0">
                            <i class="fas fa-users-cog text-primary"></i> 用户管理
                        </h3>
                    </div>
                    <div class="card-body">
                        <div th:if="${message}" class="alert alert-success alert-dismissible fade show">
                            <span th:text="${message}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>头像</th>
                                        <th>用户ID</th>
                                        <th>用户名</th>
                                        <th>邮箱</th>
                                        <th>角色</th>
                                        <th>状态</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="user : ${users}">
                                        <td>
                                            <img th:if="${user.avatar != null}" 
                                                 th:src="@{|/${user.avatar}|}" 
                                                 alt="头像" 
                                                 class="avatar-thumb">
                                            <i th:if="${user.avatar == null}" 
                                               class="fas fa-user-circle text-muted" 
                                               style="font-size: 32px;"></i>
                                        </td>
                                        <td th:text="${user.userId}"></td>
                                        <td th:text="${user.username}"></td>
                                        <td th:text="${user.email}"></td>
                                        <td>
                                            <span class="badge bg-primary" th:text="${user.role}"></span>
                                        </td>
                                        <td>
                                            <span th:if="${user.status == 'enabled'}" class="badge bg-success">正常</span>
                                            <span th:if="${user.status == 'disabled'}" class="badge bg-danger">已禁用</span>
                                        </td>
                                        <td>
                                            <a th:if="${user.status == 'disabled'}" 
                                               th:href="@{/user/enable/{id}(id=${user.userId})}" 
                                               class="btn btn-success btn-sm">
                                                <i class="fas fa-check"></i> 启用
                                            </a>
                                            <a th:if="${user.status == 'enabled'}" 
                                               th:href="@{/user/disable/{id}(id=${user.userId})}" 
                                               class="btn btn-danger btn-sm">
                                                <i class="fas fa-ban"></i> 禁用
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
