# 服务器配置
server.port=7090
server.servlet.context-path=/campus-activity

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/campus_activity?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis配置
mybatis.mapper-locations=classpath:mybatis/*.xml
mybatis.type-aliases-package=com.campusactivity.entity

# Thymeleaf配置
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML5
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.cache=false

# 静态资源配置
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.add-mappings=true

# 文件上传配置
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Spring Security配置
spring.security.user.name=admin
spring.security.user.password=admin
spring.security.user.roles=ADMIN