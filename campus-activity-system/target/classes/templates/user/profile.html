<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 校园活动管理系统</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
    <link th:href="@{/css/fontawesome.min.css}" rel="stylesheet">
    <style>
        .profile-container {
            display: flex;
            min-height: calc(100vh - 56px);
            background: #f5f7fa;
        }
        
        .profile-sidebar {
            width: 200px;
            background: white;
            border-right: 1px solid #e0e0e0;
            padding: 20px 0;
        }
        
        .profile-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .profile-menu-item {
            padding: 15px 25px;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .profile-menu-item:hover {
            background: #f8f9fa;
            color: #4a90e2;
        }
        
        .profile-menu-item.active {
            background: rgba(74, 144, 226, 0.1);
            color: #4a90e2;
            border-left-color: #4a90e2;
            font-weight: 600;
        }
        
        .profile-content {
            flex: 1;
            padding: 30px;
        }
        
        .profile-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }
        
        .avatar-section {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .avatar-upload {
            position: relative;
            display: inline-block;
        }
        
        .avatar-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #f0f0f0;
        }
        
        .avatar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            cursor: pointer;
        }
        
        .avatar-upload:hover .avatar-overlay {
            opacity: 1;
        }
        
        .avatar-overlay i {
            color: white;
            font-size: 24px;
        }
        
        #avatarInput {
            display: none;
        }
        
        .user-info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        
        .info-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .info-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .info-value {
            font-size: 16px;
            color: #333;
            font-weight: 600;
        }
        
        .function-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .function-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #333;
        }
        
        .function-card:hover {
            border-color: #4a90e2;
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.2);
            color: #4a90e2;
        }
        
        .function-icon {
            font-size: 36px;
            margin-bottom: 15px;
            color: #4a90e2;
        }
        
        .function-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .function-desc {
            font-size: 12px;
            color: #999;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title i {
            color: #4a90e2;
        }
        
        .edit-form .form-group {
            margin-bottom: 20px;
        }
        
        .edit-form label {
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        
        .edit-form .form-control {
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            padding: 12px 16px;
        }
        
        .edit-form .form-control:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }
        
        .btn-save {
            background: linear-gradient(135deg, #4a90e2, #50c878);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.4);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid px-4">
            <a class="navbar-brand" th:href="@{/}">
                <i class="fas fa-graduation-cap"></i> 校园活动管理系统
            </a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <span class="text-muted">
                    <i class="fas fa-user-circle"></i> 
                    <span th:text="${user.username}"></span>
                </span>
                <a th:href="@{/}" class="btn btn-sm btn-outline-secondary">
                    <i class="fas fa-home"></i> 返回首页
                </a>
            </div>
        </div>
    </nav>

    <div class="profile-container">
        <!-- 左侧菜单 -->
        <div class="profile-sidebar">
            <ul class="profile-menu">
                <li class="profile-menu-item active" data-section="info">
                    <i class="fas fa-user"></i> 个人资料
                </li>
                <li class="profile-menu-item" data-section="edit">
                    <i class="fas fa-edit"></i> 编辑资料
                </li>
                <li class="profile-menu-item" data-section="functions">
                    <i class="fas fa-th-large"></i> 功能中心
                </li>
            </ul>
        </div>

        <!-- 右侧内容区 -->
        <div class="profile-content">
            <!-- 个人资料页面 -->
            <div id="section-info" class="content-section">
                <div class="profile-card">
                    <!-- 头像区域 -->
                    <div class="avatar-section">
                        <div class="avatar-upload" onclick="document.getElementById('avatarInput').click()">
                            <img th:if="${user.avatar != null}"
                                 th:src="@{|/${user.avatar}|}" 
                                 th:data-original-src="@{|/${user.avatar}|}"
                                 class="avatar-img" 
                                 id="avatarPreview"
                                 alt="用户头像">
                            <img th:unless="${user.avatar != null}"
                                 src="https://via.placeholder.com/100" 
                                 data-original-src="https://via.placeholder.com/100"
                                 class="avatar-img" 
                                 id="avatarPreview"
                                 alt="用户头像">
                            <div class="avatar-overlay">
                                <i class="fas fa-camera"></i>
                            </div>
                        </div>
                        <input type="file" 
                               id="avatarInput" 
                               accept="image/*" 
                               onchange="uploadAvatar(this)">
                        <div class="mt-3">
                            <h4 th:text="${user.username}"></h4>
                            <p class="text-muted mb-0">
                                <span class="badge bg-primary" th:text="${user.role}"></span>
                            </p>
                        </div>
                    </div>

                    <!-- 用户信息网格 -->
                    <div class="user-info-grid">
                        <div class="info-item">
                            <div class="info-label">
                                <i class="fas fa-user"></i> 用户名
                            </div>
                            <div class="info-value" th:text="${user.username}"></div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">
                                <i class="fas fa-envelope"></i> 邮箱
                            </div>
                            <div class="info-value" th:text="${user.email}"></div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">
                                <i class="fas fa-clock"></i> 注册时间
                            </div>
                            <div class="info-value" th:text="${#dates.format(user.createTime, 'yyyy-MM-dd HH:mm:ss')}"></div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">
                                <i class="fas fa-shield-alt"></i> 账号状态
                            </div>
                            <div class="info-value">
                                <span class="badge bg-success" th:if="${user.status == 'enabled'}">正常</span>
                                <span class="badge bg-danger" th:if="${user.status == 'disabled'}">已禁用</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 编辑资料页面 -->
            <div id="section-edit" class="content-section" style="display: none;">
                <div class="profile-card">
                    <h3 class="section-title">
                        <i class="fas fa-edit"></i> 编辑个人资料
                    </h3>
                    
                    <div th:if="${message}" class="alert alert-success alert-dismissible fade show">
                        <span th:text="${message}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                        <span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form th:action="@{/user/profile/update}" th:object="${user}" method="post" class="edit-form">
                        <div class="form-group">
                            <label for="username">用户名</label>
                            <input type="text" class="form-control" id="username" th:field="*{username}" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">邮箱</label>
                            <input type="email" class="form-control" id="email" th:field="*{email}" required>
                        </div>
                        
                        <div class="form-group">
                            <label>角色</label>
                            <input type="text" class="form-control" th:value="${user.role}" disabled>
                        </div>
                        
                        <div class="form-group">
                            <label>账号状态</label>
                            <input type="text" class="form-control" th:value="${user.status}" disabled>
                        </div>
                        
                        <button type="submit" class="btn-save">
                            <i class="fas fa-save"></i> 保存修改
                        </button>
                    </form>
                </div>
            </div>

            <!-- 功能中心页面 -->
            <div id="section-functions" class="content-section" style="display: none;">
                <div class="profile-card">
                    <h3 class="section-title">
                        <i class="fas fa-th-large"></i> 功能中心
                    </h3>
                    
                    <!-- 管理员功能 -->
                    <div th:if="${user.role == 'admin'}">
                        <div class="function-grid">
                            <a th:href="@{/user/list}" class="function-card">
                                <div class="function-icon">
                                    <i class="fas fa-users-cog"></i>
                                </div>
                                <div class="function-title">用户管理</div>
                                <div class="function-desc">管理系统所有用户</div>
                            </a>
                            
                            <a th:href="@{/activity/manage}" class="function-card">
                                <div class="function-icon">
                                    <i class="fas fa-tasks"></i>
                                </div>
                                <div class="function-title">活动管理</div>
                                <div class="function-desc">管理所有活动</div>
                            </a>
                            

                            
                            <a th:href="@{/announcement/list}" class="function-card">
                                <div class="function-icon">
                                    <i class="fas fa-bullhorn"></i>
                                </div>
                                <div class="function-title">公告管理</div>
                                <div class="function-desc">发布系统公告</div>
                            </a>
                        </div>
                    </div>
                    
                    <!-- 普通用户功能 -->
                    <div th:if="${user.role != 'admin'}">
                        <div class="function-grid">
                            <a th:href="@{/activity/list}" class="function-card">
                                <div class="function-icon">
                                    <i class="fas fa-calendar-check"></i>
                                </div>
                                <div class="function-title">活动报名</div>
                                <div class="function-desc">浏览并报名活动</div>
                            </a>
                            
                            <a th:href="@{/registration/my}" class="function-card">
                                <div class="function-icon">
                                    <i class="fas fa-clipboard-list"></i>
                                </div>
                                <div class="function-title">我的报名</div>
                                <div class="function-desc">查看报名记录</div>
                            </a>
                            

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
    <script>
        // 菜单切换
        document.querySelectorAll('.profile-menu-item').forEach(item => {
            item.addEventListener('click', function() {
                // 移除所有active
                document.querySelectorAll('.profile-menu-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                
                // 隐藏所有section
                document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
                
                // 显示对应section
                const section = this.getAttribute('data-section');
                document.getElementById('section-' + section).style.display = 'block';
            });
        });

        // 头像上传
        function uploadAvatar(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                
                // 预览图片
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('avatarPreview').src = e.target.result;
                };
                reader.readAsDataURL(file);
                
                // 上传到服务器
                const formData = new FormData();
                formData.append('avatar', file);
                
                fetch('/campus-activity/user/profile/upload-avatar', {
                    method: 'POST',
                    body: formData,
                    timeout: 10000 // 10秒超时
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('网络响应错误');
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.success) {
                        // 直接更新页面而不刷新
                        const avatarPreview = document.getElementById('avatarPreview');
                        if (data.avatarUrl) {
                            avatarPreview.src = '/campus-activity/' + data.avatarUrl;
                        }
                        alert('头像上传成功！');
                    } else {
                        alert('上传失败：' + data.message);
                    }
                })
                .catch(error => {
                    console.error('上传错误:', error);
                    alert('上传失败，请重试');
                    // 恢复原始头像
                    const originalSrc = document.getElementById('avatarPreview').dataset.originalSrc;
                    if (originalSrc) {
                        document.getElementById('avatarPreview').src = originalSrc;
                    }
                });
            }
        }
    </script>
</body>
</html>
