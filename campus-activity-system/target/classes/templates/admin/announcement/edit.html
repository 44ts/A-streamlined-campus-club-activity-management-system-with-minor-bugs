<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑公告 - 校园活动管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">校园活动管理系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/announcement}">公告</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="adminDropdown" role="button" data-bs-toggle="dropdown">
                            管理中心
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" th:href="@{/admin/profile}">个人中心</a></li>
                            <li><a class="dropdown-item" th:href="@{/announcement/list}">公告管理</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" th:href="@{/logout}">退出登录</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="text-center mb-4">编辑公告</h2>
        
        <div class="row justify-content-center">
            <div class="col-md-8">
                <form th:action="@{/announcement/edit}" method="post">
                    <input type="hidden" name="announcementId" th:value="${announcement.announcementId}">
                    <div class="mb-3">
                        <label for="title" class="form-label">公告标题</label>
                        <input type="text" class="form-control" id="title" name="title" th:value="${announcement.title}" required>
                    </div>
                    <div class="mb-3">
                        <label for="content" class="form-label">公告内容</label>
                        <textarea class="form-control" id="content" name="content" rows="10" required th:text="${announcement.content}"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="status" class="form-label">状态</label>
                        <select class="form-select" id="status" name="status">
                            <option value="published" th:selected="${announcement.status == 'published' or announcement.status == '1'}">已发布</option>
                            <option value="draft" th:selected="${announcement.status == 'draft' or announcement.status == '0'}">未发布</option>
                        </select>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a th:href="@{/announcement/list}" class="btn btn-secondary">取消</a>
                        <button type="submit" class="btn btn-primary">更新公告</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
